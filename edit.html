<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Torneo CPN — Llena tus jugadores</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #2d5a27;
      color: white;
      min-height: 100vh;
      font-size: 16px;
      padding: 20px;
    }
    .container { max-width: 700px; margin: 0 auto; }

    .brand {
      display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
    }
    .brand .cpn {
      font-family: Georgia, serif; font-weight: 900; font-size: 1.8rem;
      letter-spacing: -2px; line-height: 1;
    }
    .brand .ball {
      width: 28px; height: 28px; border: 2px solid white; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 0.7rem;
      background: rgba(255,255,255,0.06);
    }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    .subtitle { color: rgba(255,255,255,0.65); font-size: 0.95rem; margin-bottom: 22px; }

    .card {
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .info-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 0.92rem;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row .lbl { color: rgba(255,255,255,0.55); }
    .info-row .val { font-weight: 600; }

    .player-card {
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .player-card.placeholder {
      border-color: rgba(255,158,199,0.35);
      border-style: dashed;
    }
    .player-card .pcart {
      display: inline-block;
      background: rgba(255,255,255,0.08);
      padding: 3px 10px;
      border-radius: 999px;
      font-family: monospace;
      font-size: 0.8rem;
      margin-bottom: 8px;
    }
    .field { margin-bottom: 12px; }
    .field label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      color: #a8d5a2;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%; padding: 12px 14px; border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: white; font-size: 1rem; outline: none;
      font-family: inherit; -webkit-appearance: none;
    }
    .field input:focus { border-color: #f0c040; }

    .row { display: grid; grid-template-columns: 1fr 100px; gap: 10px; }

    button.save-btn {
      width: 100%; padding: 18px;
      background: #f0c040; color: #0a3d1f;
      border: none; border-radius: 14px;
      font-size: 1.05rem; font-weight: 800;
      letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; font-family: inherit;
      margin-top: 10px;
    }
    button.save-btn:active { transform: scale(0.98); }
    button.save-btn:disabled { background: #555; cursor: not-allowed; opacity: 0.6; }

    .saved-flash {
      background: rgba(125,220,125,0.15);
      border: 1px solid rgba(125,220,125,0.4);
      color: #7ddc7d;
      padding: 12px 16px;
      border-radius: 10px;
      text-align: center;
      font-weight: 700;
      margin-top: 12px;
      display: none;
    }
    .saved-flash.show { display: block; }

    .empty, .error {
      text-align: center;
      padding: 40px 20px;
      color: rgba(255,255,255,0.55);
    }
    .error { color: #ff8a8a; }

    .sponsor-logo img {
      max-width: 120px; max-height: 80px;
      background: white; padding: 6px; border-radius: 8px;
      margin-bottom: 12px;
    }
  </style>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
    import {
      getFirestore, collection, doc, setDoc, query, where, getDocs, orderBy
    } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDseQrWnydirdsMTTzDbg9cdVMmYPly94U",
      authDomain: "can-checkin.firebaseapp.com",
      projectId: "can-checkin",
      storageBucket: "can-checkin.firebasestorage.app",
      messagingSenderId: "227427880420",
      appId: "1:227427880420:web:1affc92a279efb049a8bf1"
    };
    const fbApp = initializeApp(firebaseConfig);
    const db = getFirestore(fbApp);
    window.fb = { db, collection, doc, setDoc, query, where, getDocs, orderBy };
    window.dispatchEvent(new Event('fb-ready'));
  </script>
</head>
<body>
  <div class="container">
    <div class="brand">
      <span class="cpn">cpn</span>
      <span class="ball">⛳</span>
    </div>
    <h1>Llena tus jugadores</h1>
    <p class="subtitle" id="subtitle">Cargando…</p>

    <div id="content"></div>
  </div>

  <script>
    const TIER_LABELS = { '1':'Tier 1', '2':'Tier 2', '3':'Tier 3', 'individual':'Individual' };

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    function getToken() {
      const params = new URLSearchParams(window.location.search);
      return params.get('token');
    }

    function showError(msg) {
      document.getElementById('subtitle').textContent = '';
      document.getElementById('content').innerHTML = `<div class="card"><div class="error">${escapeHtml(msg)}</div></div>`;
    }

    let sponsor = null;
    let players = [];

    async function load() {
      const token = getToken();
      if (!token) { showError('Link inválido — falta token.'); return; }

      const tries = 30;
      for (let i = 0; i < tries; i++) {
        if (window.fb) break;
        await new Promise(r => setTimeout(r, 100));
      }
      if (!window.fb) { showError('No se pudo conectar al servidor.'); return; }

      const { db, collection, query, where, getDocs } = window.fb;
      try {
        // Find sponsor by token
        const spSnap = await getDocs(query(collection(db, 'sponsors'), where('editToken', '==', token)));
        if (spSnap.empty) { showError('Link no válido o ya expiró.'); return; }
        const spDoc = spSnap.docs[0];
        sponsor = { id: spDoc.id, ...spDoc.data() };

        // Fetch their roster players
        const ids = sponsor.playerIds || [];
        if (ids.length === 0) { showError('No hay jugadores asignados.'); return; }
        const playerDocs = await Promise.all(ids.map(async pid => {
          const pSnap = await getDocs(query(collection(db, 'roster'), where('__name__', '==', pid)));
          return pSnap.empty ? null : { num: pSnap.docs[0].id, ...pSnap.docs[0].data() };
        }));
        players = playerDocs.filter(Boolean).sort((a,b) => {
          if (a.hole !== b.hole) return a.hole - b.hole;
          if (a.cart !== b.cart) return a.cart.localeCompare(b.cart);
          return (a.addedAt || 0) - (b.addedAt || 0);
        });

        renderSponsorView();
      } catch (e) {
        console.error(e);
        showError('Error cargando datos. Recarga la página o avisa al organizador.');
      }
    }

    function renderSponsorView() {
      document.getElementById('subtitle').textContent =
        `${sponsor.name} · ${TIER_LABELS[sponsor.tier] || sponsor.tier} · ${players.length} jugador(es)`;

      const logoHtml = sponsor.logo && !sponsor.logo.startsWith('data:application/pdf')
        ? `<div class="sponsor-logo"><img src="${sponsor.logo}" /></div>`
        : '';

      const carts = [...new Set(players.map(p => `${p.hole}${p.cart}`))].join(', ');

      const playersHtml = players.map((p, idx) => {
        const isPlaceholder = !!p.isPlaceholder || /^Player\s+\d+$/i.test(p.name || '');
        const cls = isPlaceholder ? 'player-card placeholder' : 'player-card';
        return `
          <div class="${cls}">
            <div class="pcart">Hoyo ${p.hole} · Cart ${p.cart}</div>
            <div class="field">
              <label for="pname-${idx}">Nombre del jugador *</label>
              <input type="text" id="pname-${idx}" data-idx="${idx}" autocomplete="off" autocapitalize="words" value="${escapeHtml(p.name || '')}" />
            </div>
            <div class="field" style="margin-bottom:0;">
              <label for="phcp-${idx}">Handicap (opcional)</label>
              <input type="number" id="phcp-${idx}" data-idx="${idx}" step="0.1" inputmode="decimal" value="${p.handicap != null ? p.handicap : ''}" placeholder="Ej. 18" />
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('content').innerHTML = `
        ${logoHtml}
        <div class="card">
          <div class="info-row"><span class="lbl">Sponsor</span><span class="val">${escapeHtml(sponsor.name)}</span></div>
          <div class="info-row"><span class="lbl">Tier</span><span class="val">${TIER_LABELS[sponsor.tier] || sponsor.tier}</span></div>
          <div class="info-row"><span class="lbl">Carts asignados</span><span class="val" style="font-family:monospace;">${escapeHtml(carts)}</span></div>
          <div class="info-row"><span class="lbl">Total jugadores</span><span class="val">${players.length}</span></div>
        </div>

        <div class="card">
          <div style="font-size:0.78rem; text-transform:uppercase; letter-spacing:1.5px; color:#a8d5a2; margin-bottom:12px; font-weight:800;">Tus Jugadores</div>
          ${playersHtml}
        </div>

        <button class="save-btn" id="save-btn" onclick="saveAll()">💾 Guardar Cambios</button>
        <div class="saved-flash" id="saved-flash">✓ Guardado</div>
      `;
    }

    async function saveAll() {
      const btn = document.getElementById('save-btn');
      btn.disabled = true;
      btn.textContent = 'Guardando…';

      const { db, doc, setDoc } = window.fb;
      try {
        for (let i = 0; i < players.length; i++) {
          const nameEl = document.getElementById(`pname-${i}`);
          const hcpEl = document.getElementById(`phcp-${i}`);
          const newName = (nameEl.value || '').trim();
          if (!newName) { alert(`Falta nombre para Cart ${players[i].hole}${players[i].cart}.`); btn.disabled = false; btn.textContent = '💾 Guardar Cambios'; return; }
          const hcpRaw = (hcpEl.value || '').trim();
          const handicap = hcpRaw === '' ? null : parseFloat(hcpRaw);
          const update = {
            name: newName,
            isPlaceholder: false,
          };
          if (handicap !== null && !isNaN(handicap)) update.handicap = handicap;
          await setDoc(doc(db, 'roster', players[i].num), update, { merge: true });
          players[i].name = newName;
          players[i].handicap = update.handicap;
          players[i].isPlaceholder = false;
        }
        const flash = document.getElementById('saved-flash');
        flash.classList.add('show');
        setTimeout(() => flash.classList.remove('show'), 2500);
      } catch (e) {
        console.error(e);
        alert('Error guardando. Intenta de nuevo.');
      }
      btn.disabled = false;
      btn.textContent = '💾 Guardar Cambios';
    }

    window.saveAll = saveAll;
    load();
  </script>
</body>
</html>
